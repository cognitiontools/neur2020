<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEUR2020 Multisensory Integration Tutorial</title>

  <!-- jsPsych 8 -->
  <script src="https://unpkg.com/jspsych@8.2.1"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@2.1.0"></script>
  <script src="https://unpkg.com/@jspsych/plugin-fullscreen@2.1.0"></script>
  <link rel="stylesheet" href="https://unpkg.com/jspsych@8.2.1/css/jspsych.css">

  <!-- Ask the browser to begin loading the original Psychtoolbox assets. -->
  <link rel="preload" as="image" href="instruct_1.bmp">
  <link rel="preload" as="image" href="instruct_2.bmp">
  <link rel="preload" as="image" href="instruct_3.bmp">
  <link rel="preload" as="image" href="instruct_4.bmp">
  <link rel="preload" as="image" href="practice_intro.bmp">
  <link rel="preload" as="image" href="actual_intro.bmp">
  <link rel="preload" as="image" href="target.bmp">
  <link rel="preload" as="image" href="break.bmp">

  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: rgb(127, 127, 127);
    }

    body,
    .jspsych-display-element,
    .jspsych-content-wrapper,
    .jspsych-content {
      background: rgb(127, 127, 127);
      color: black;
    }

    .jspsych-content {
      max-width: none;
    }

    .asset-screen {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      box-sizing: border-box;
      padding: 2vh 2vw;
    }

    .asset-image {
      display: block;
      max-width: 90vw;
      max-height: 86vh;
      width: auto;
      height: auto;
      object-fit: contain;
    }

    .asset-fallback {
      display: none;
      max-width: 850px;
      padding: 30px;
      font-family: Arial, sans-serif;
      font-size: 28px;
      line-height: 1.45;
      text-align: center;
      background: rgba(255, 255, 255, 0.75);
      border-radius: 12px;
    }

    .fixation-screen {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: rgb(127, 127, 127);
    }

    .fixation-cross {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 20px;
      height: 20px;
      transform: translate(-50%, -50%);
    }

    .fixation-cross::before,
    .fixation-cross::after {
      content: "";
      position: absolute;
      background: black;
    }

    .fixation-cross::before {
      width: 20px;
      height: 2px;
      left: 0;
      top: 9px;
    }

    .fixation-cross::after {
      width: 2px;
      height: 20px;
      left: 9px;
      top: 0;
    }

    #msi-noise-canvas {
      display: block;
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: rgb(127, 127, 127);
    }

    .plain-message {
      max-width: 900px;
      margin: 0 auto;
      padding: 35px;
      font-family: Arial, sans-serif;
      font-size: 26px;
      line-height: 1.5;
      text-align: center;
      background: rgba(255, 255, 255, 0.75);
      border-radius: 12px;
    }

    kbd {
      display: inline-block;
      min-width: 1.6em;
      padding: 0.1em 0.35em;
      border: 1px solid #555;
      border-radius: 5px;
      background: #eee;
      font-family: monospace;
      font-size: 0.9em;
    }

    body.results-mode {
      overflow-y: auto;
      background: #ffffff;
      color: #1d2730;
      font-family: Arial, Helvetica, sans-serif;
    }

    body.results-mode .jspsych-display-element,
    body.results-mode .jspsych-content-wrapper,
    body.results-mode .jspsych-content {
      background: #ffffff;
      color: #1d2730;
    }

    .results-page {
      width: min(1050px, 92vw);
      margin: 0 auto;
      padding: 30px 0 60px;
    }

    .results-card {
      border: 1px solid #c9d1d8;
      border-radius: 12px;
      padding: 30px;
      background: #ffffff;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
    }

    .results-card h1,
    .results-card h2,
    .results-card h3 {
      margin-top: 0;
    }

    .results-card p {
      line-height: 1.55;
    }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin: 22px 0;
    }

    .metric {
      border: 1px solid #c9d1d8;
      border-radius: 9px;
      padding: 14px;
      background: #f5f7f9;
      text-align: center;
    }

    .metric-label {
      color: #5d6872;
      font-size: 14px;
    }

    .metric-value {
      margin-top: 5px;
      font-size: 27px;
      font-weight: 700;
    }

    .comparison-note {
      margin: 20px 0;
      padding: 16px 18px;
      border-left: 5px solid #245b87;
      background: #eef5fa;
      line-height: 1.55;
    }

    .results-card table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 18px;
      font-size: 15px;
    }

    .results-card th,
    .results-card td {
      border: 1px solid #c9d1d8;
      padding: 9px;
      text-align: center;
    }

    .results-card th {
      background: #e9eef2;
    }

    .chart-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
      gap: 18px;
      margin-top: 18px;
    }

    .chart-wrap {
      width: 100%;
      border: 1px solid #c9d1d8;
      border-radius: 10px;
      background: #ffffff;
      overflow: hidden;
    }

    .chart-wrap h3 {
      margin: 16px 16px 0;
      text-align: center;
    }

    .sdt-canvas {
      display: block;
      width: 100%;
      height: 340px;
    }

    .calculation-box {
      margin-top: 18px;
      padding: 18px 20px;
      border: 1px solid #c9d1d8;
      border-radius: 10px;
      background: #f5f7f9;
    }

    .results-card details {
      margin-top: 22px;
    }

    .results-card summary {
      cursor: pointer;
    }

    .results-button {
      margin-top: 24px;
      padding: 12px 22px;
      border: 1px solid #245b87;
      border-radius: 8px;
      background: #245b87;
      color: #ffffff;
      font-size: 18px;
      cursor: pointer;
    }

    .results-button:hover {
      background: #194666;
    }

    @media (max-width: 700px) {
      .results-card {
        padding: 20px;
      }

      .chart-grid {
        grid-template-columns: 1fr;
      }
    }

  </style>
</head>
<body></body>

<script>
"use strict";

/* --------------------------------------------------------------------------
   CONFIGURATION
   -------------------------------------------------------------------------- */

const CONFIG = {
  // Matches the MATLAB variable: 1 = 50 ms; 2 = 250 ms.
  timeCondition: 1,

  // The browser cannot reliably read the monitor's physical dimensions.
  // This provides an approximate conversion from visual degrees to pixels.
  // Adjust after calibration if precise visual angles are required.
  pixelsPerDegree: 50,

  virtualRefreshRate: 60,
  backgroundGray: 127,
  noiseDurationMs: 1000,
  toneFrequencyHz: 1800,
  toneAmplitude: 0.20,

  stimulusFramesByTimeCondition: [3, 15],
  stimulusDurationMsByTimeCondition: [50, 250],
  stimulusOnsetFrames: [30, 35, 40, 45],
  visibilityLevels: [0.34, 0.38],

  noiseRadiusDeg: 9,
  noiseTextureSize: 81,
  spotRadiusDeg: 1,
  spotOffsetDeg: 6,

  fixationDurationBaseMs: 500,
  fixationJitterMinMs: 250,
  fixationJitterMaxMs: 500,

  numberPracticeTrials: 12,
  numberTrialsPerCondition: 1,

  // Response mapping used for scoring and the results screen.
  // Current mapping: left arrow = present; right arrow = absent.
  spotPresentKey: "ArrowLeft"
};

const ASSETS = {
  instruction1: "instruct_1.bmp",
  instruction2: "instruct_2.bmp",
  instruction3: "instruct_3.bmp",
  instruction4: "instruct_4.bmp",
  practiceIntro: "practice_intro.bmp",
  actualIntro: "actual_intro.bmp",
  target: "target.bmp",
  break: "break.bmp"
};

const participantCode = Math.floor(Math.random() * 1000000) + 1;
const selectedStimulusFrames =
  CONFIG.stimulusFramesByTimeCondition[CONFIG.timeCondition - 1];
const selectedStimulusDurationMs =
  CONFIG.stimulusDurationMsByTimeCondition[CONFIG.timeCondition - 1];

let audioContext = null;

const jsPsych = initJsPsych({
  case_sensitive_responses: false,
  on_finish: showResults
});

jsPsych.data.addProperties({
  participant: participantCode,
  experiment: "NEUR2020_MSI_Tutorial",
  time_condition: CONFIG.timeCondition,
  nominal_stimulus_duration_ms: selectedStimulusDurationMs
});

/* --------------------------------------------------------------------------
   GENERAL HELPERS
   -------------------------------------------------------------------------- */

function randomInteger(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function assetScreen(filename, altText, fallbackHtml) {
  return `
    <div class="asset-screen">
      <img
        class="asset-image"
        src="${filename}"
        alt="${altText}"
        draggable="false"
        onerror="this.style.display='none'; this.nextElementSibling.style.display='block';"
      >
      <div class="asset-fallback">${fallbackHtml}</div>
    </div>`;
}

function unlockAudio() {
  try {
    if (!audioContext) {
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (AudioContextClass) {
        audioContext = new AudioContextClass();
      }
    }

    if (audioContext && audioContext.state === "suspended") {
      audioContext.resume().catch(function() {
        // The trial data will identify whether the audio context remained locked.
      });
    }
  } catch (error) {
    console.warn("Web Audio could not be initialized:", error);
  }
}

function scheduleTone(onsetMs, durationMs, enabled) {
  const result = {
    tone_requested: Boolean(enabled),
    tone_scheduled: false,
    audio_context_state: audioContext ? audioContext.state : "unavailable",
    tone_onset_scheduled_ms: enabled ? onsetMs : null
  };

  if (!enabled || !audioContext) {
    return result;
  }

  try {
    const oscillator = audioContext.createOscillator();
    const gain = audioContext.createGain();
    const startTime = audioContext.currentTime + onsetMs / 1000;
    const stopTime = startTime + durationMs / 1000;
    const rampSeconds = Math.min(0.003, durationMs / 4000);

    oscillator.type = "sine";
    oscillator.frequency.setValueAtTime(CONFIG.toneFrequencyHz, startTime);

    gain.gain.setValueAtTime(0, startTime);
    gain.gain.linearRampToValueAtTime(
      CONFIG.toneAmplitude,
      startTime + rampSeconds
    );
    gain.gain.setValueAtTime(
      CONFIG.toneAmplitude,
      Math.max(startTime + rampSeconds, stopTime - rampSeconds)
    );
    gain.gain.linearRampToValueAtTime(0, stopTime);

    oscillator.connect(gain);
    gain.connect(audioContext.destination);

    oscillator.start(startTime);
    oscillator.stop(stopTime + 0.01);

    result.tone_scheduled = true;
    result.audio_context_state = audioContext.state;
    result.audio_start_clock_s = startTime;
  } catch (error) {
    console.warn("Tone scheduling failed:", error);
    result.audio_error = String(error);
  }

  return result;
}

/* --------------------------------------------------------------------------
   RESULTS AND SDT HELPERS
   -------------------------------------------------------------------------- */

function inverseNormalCDF(p) {
  const a = [
    -39.6968302866538, 220.946098424521, -275.928510446969,
    138.357751867269, -30.6647980661472, 2.50662827745924
  ];
  const b = [
    -54.4760987982241, 161.585836858041, -155.698979859887,
    66.8013118877197, -13.2806815528857
  ];
  const c = [
    -0.00778489400243029, -0.322396458041136,
    -2.40075827716184, -2.54973253934373,
    4.37466414146497, 2.93816398269878
  ];
  const d = [
    0.00778469570904146, 0.32246712907004,
    2.445134137143, 3.75440866190742
  ];
  const low = 0.02425;
  const high = 1 - low;
  let q;
  let r;

  if (p < low) {
    q = Math.sqrt(-2 * Math.log(p));
    return (((((c[0] * q + c[1]) * q + c[2]) * q + c[3]) * q + c[4]) * q + c[5]) /
      ((((d[0] * q + d[1]) * q + d[2]) * q + d[3]) * q + 1);
  }

  if (p <= high) {
    q = p - 0.5;
    r = q * q;
    return (((((a[0] * r + a[1]) * r + a[2]) * r + a[3]) * r + a[4]) * r + a[5]) * q /
      (((((b[0] * r + b[1]) * r + b[2]) * r + b[3]) * r + b[4]) * r + 1);
  }

  q = Math.sqrt(-2 * Math.log(1 - p));
  return -(((((c[0] * q + c[1]) * q + c[2]) * q + c[3]) * q + c[4]) * q + c[5]) /
    ((((d[0] * q + d[1]) * q + d[2]) * q + d[3]) * q + 1);
}

function mean(values) {
  if (values.length === 0) return null;
  return values.reduce((sum, value) => sum + value, 0) / values.length;
}

function calculateSDT(rows) {
  const hits = rows.filter(row => row.sdt_outcome === "Hit").length;
  const misses = rows.filter(row => row.sdt_outcome === "Miss").length;
  const falseAlarms = rows.filter(row => row.sdt_outcome === "False alarm").length;
  const correctRejections = rows.filter(row => row.sdt_outcome === "Correct rejection").length;
  const signalTrials = hits + misses;
  const noiseTrials = falseAlarms + correctRejections;

  // Log-linear correction prevents infinite z scores at rates of 0 or 1.
  const hitRate = signalTrials > 0 ? (hits + 0.5) / (signalTrials + 1) : null;
  const falseAlarmRate = noiseTrials > 0
    ? (falseAlarms + 0.5) / (noiseTrials + 1)
    : null;

  const zHit = hitRate === null ? null : inverseNormalCDF(hitRate);
  const zFA = falseAlarmRate === null ? null : inverseNormalCDF(falseAlarmRate);
  const dPrime = zHit === null || zFA === null ? null : zHit - zFA;
  const criterion = zHit === null || zFA === null
    ? null
    : -0.5 * (zHit + zFA);

  const correctRows = rows.filter(row => row.correct === true && Number.isFinite(row.rt));
  const respondedRows = rows.filter(row => Number.isFinite(row.rt));

  return {
    n: rows.length,
    hits,
    misses,
    falseAlarms,
    correctRejections,
    signalTrials,
    noiseTrials,
    hitRate,
    falseAlarmRate,
    zHit,
    zFA,
    dPrime,
    criterion,
    accuracy: rows.length > 0
      ? rows.filter(row => row.correct === true).length / rows.length
      : null,
    meanCorrectRT: mean(correctRows.map(row => row.rt)),
    meanRT: mean(respondedRows.map(row => row.rt))
  };
}

function formatNumber(value, digits = 2) {
  return Number.isFinite(value) ? value.toFixed(digits) : "—";
}

function formatPercent(value) {
  return Number.isFinite(value) ? `${(value * 100).toFixed(1)}%` : "—";
}

function formatRT(value) {
  return Number.isFinite(value) ? `${Math.round(value)} ms` : "—";
}

function normalPDF(x, meanValue = 0, sd = 1) {
  const z = (x - meanValue) / sd;
  return Math.exp(-0.5 * z * z) / (sd * Math.sqrt(2 * Math.PI));
}

function drawSDTPlot(canvasId, summary) {
  const canvas = document.getElementById(canvasId);
  if (!canvas || !Number.isFinite(summary.dPrime) || !Number.isFinite(summary.criterion)) {
    return;
  }

  const parentWidth = canvas.parentElement.clientWidth || 500;
  const width = Math.max(360, parentWidth);
  const height = 340;
  const devicePixelRatio = window.devicePixelRatio || 1;

  canvas.width = Math.round(width * devicePixelRatio);
  canvas.height = Math.round(height * devicePixelRatio);
  canvas.style.width = `${width}px`;
  canvas.style.height = `${height}px`;

  const context = canvas.getContext("2d");
  context.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  context.clearRect(0, 0, width, height);

  const margin = { left: 48, right: 20, top: 34, bottom: 52 };
  const plotWidth = width - margin.left - margin.right;
  const plotHeight = height - margin.top - margin.bottom;
  const baselineY = margin.top + plotHeight;
  const noiseMean = 0;
  const signalMean = summary.dPrime;
  const criterionLocation = summary.criterion + summary.dPrime / 2;
  const xMin = Math.min(-4, signalMean - 4, criterionLocation - 1);
  const xMax = Math.max(4, signalMean + 4, criterionLocation + 1);
  const yMax = normalPDF(0) * 1.12;
  const xToPx = x => margin.left + ((x - xMin) / (xMax - xMin)) * plotWidth;
  const yToPx = y => baselineY - (y / yMax) * plotHeight;

  function fillRegion(meanValue, startX, endX, fillStyle) {
    const from = Math.max(xMin, startX);
    const to = Math.min(xMax, endX);
    if (to <= from) return;

    const steps = 180;
    context.beginPath();
    context.moveTo(xToPx(from), baselineY);
    for (let index = 0; index <= steps; index += 1) {
      const x = from + ((to - from) * index / steps);
      context.lineTo(xToPx(x), yToPx(normalPDF(x, meanValue)));
    }
    context.lineTo(xToPx(to), baselineY);
    context.closePath();
    context.fillStyle = fillStyle;
    context.fill();
  }

  function drawCurve(meanValue, strokeStyle) {
    const steps = 360;
    context.beginPath();
    for (let index = 0; index <= steps; index += 1) {
      const x = xMin + ((xMax - xMin) * index / steps);
      const px = xToPx(x);
      const py = yToPx(normalPDF(x, meanValue));
      if (index === 0) context.moveTo(px, py);
      else context.lineTo(px, py);
    }
    context.strokeStyle = strokeStyle;
    context.lineWidth = 2.2;
    context.stroke();
  }

  fillRegion(noiseMean, xMin, criterionLocation, "rgba(77, 121, 190, .35)");
  fillRegion(noiseMean, criterionLocation, xMax, "rgba(236, 153, 75, .35)");
  fillRegion(signalMean, xMin, criterionLocation, "rgba(214, 90, 90, .30)");
  fillRegion(signalMean, criterionLocation, xMax, "rgba(74, 160, 101, .35)");

  drawCurve(noiseMean, "rgb(52, 86, 142)");
  drawCurve(signalMean, "rgb(45, 126, 73)");

  context.strokeStyle = "#4a535b";
  context.lineWidth = 1.2;
  context.beginPath();
  context.moveTo(margin.left, baselineY);
  context.lineTo(width - margin.right, baselineY);
  context.stroke();

  context.setLineDash([7, 5]);
  context.strokeStyle = "#20262b";
  context.lineWidth = 2;
  context.beginPath();
  context.moveTo(xToPx(criterionLocation), margin.top);
  context.lineTo(xToPx(criterionLocation), baselineY);
  context.stroke();
  context.setLineDash([]);

  context.fillStyle = "#20262b";
  context.font = "13px Arial";
  context.textAlign = "center";
  context.fillText("Decision criterion", xToPx(criterionLocation), margin.top - 10);
  context.fillText("Internal response / evidence", margin.left + plotWidth / 2, height - 14);

  context.font = "bold 13px Arial";
  context.fillStyle = "rgb(52, 86, 142)";
  context.fillText("Noise", xToPx(noiseMean), yToPx(normalPDF(noiseMean)) - 10);
  context.fillStyle = "rgb(45, 126, 73)";
  context.fillText("Signal", xToPx(signalMean), yToPx(normalPDF(signalMean)) - 10);
}

function makeSummaryRow(label, summary) {
  return `
    <tr>
      <td><strong>${label}</strong></td>
      <td>${summary.n}</td>
      <td>${summary.hits}</td>
      <td>${summary.misses}</td>
      <td>${summary.falseAlarms}</td>
      <td>${summary.correctRejections}</td>
      <td>${formatPercent(summary.hitRate)}</td>
      <td>${formatPercent(summary.falseAlarmRate)}</td>
      <td>${formatNumber(summary.dPrime)}</td>
      <td>${formatNumber(summary.criterion)}</td>
      <td>${formatPercent(summary.accuracy)}</td>
      <td>${formatRT(summary.meanCorrectRT)}</td>
    </tr>`;
}

function showResults() {
  const rows = jsPsych.data
    .get()
    .filter({ task: "msi_tutorial", phase: "test", event: "response" })
    .values();

  const overall = calculateSDT(rows);
  const noSoundRows = rows.filter(row => row.sound === 1);
  const soundRows = rows.filter(row => row.sound === 2);
  const noSound = calculateSDT(noSoundRows);
  const sound = calculateSDT(soundRows);
  const dPrimeDifference = sound.dPrime - noSound.dPrime;
  const rtBenefit = noSound.meanCorrectRT - sound.meanCorrectRT;

  const visibilityRows = [1, 2].flatMap(visibility => [
    makeSummaryRow(
      `No sound, visibility ${visibility}`,
      calculateSDT(rows.filter(row => row.sound === 1 && row.visibility === visibility))
    ),
    makeSummaryRow(
      `Sound, visibility ${visibility}`,
      calculateSDT(rows.filter(row => row.sound === 2 && row.visibility === visibility))
    )
  ]).join("");

  const timingRows = [1, 2, 3, 4].flatMap(timing => [
    makeSummaryRow(
      `No sound, onset frame ${CONFIG.stimulusOnsetFrames[timing - 1]}`,
      calculateSDT(rows.filter(row => row.sound === 1 && row.timing === timing))
    ),
    makeSummaryRow(
      `Sound, onset frame ${CONFIG.stimulusOnsetFrames[timing - 1]}`,
      calculateSDT(rows.filter(row => row.sound === 2 && row.timing === timing))
    )
  ]).join("");

  const trialRows = rows.map(row => `
    <tr>
      <td>${row.count}</td>
      <td>${row.sound_label === "sound" ? "Sound" : "No sound"}</td>
      <td>${row.visual_stim === 2 ? "Present" : "Absent"}</td>
      <td>${row.response_label}</td>
      <td>${row.sdt_outcome}</td>
      <td>${row.correct ? "Correct" : "Incorrect"}</td>
      <td>${formatRT(row.rt)}</td>
      <td>${row.location_label}</td>
      <td>${row.visibility}</td>
      <td>${row.stimulus_onset_frame}</td>
    </tr>`).join("");

  let comparisonText;
  if (dPrimeDifference > 0.05) {
    comparisonText = `Visual sensitivity was higher in the sound condition by <strong>${dPrimeDifference.toFixed(2)} d′ units</strong>.`;
  } else if (dPrimeDifference < -0.05) {
    comparisonText = `Visual sensitivity was lower in the sound condition by <strong>${Math.abs(dPrimeDifference).toFixed(2)} d′ units</strong>.`;
  } else {
    comparisonText = "Visual sensitivity was very similar in the sound and no-sound conditions.";
  }

  const rtText = Number.isFinite(rtBenefit)
    ? rtBenefit > 0
      ? ` Correct responses were <strong>${Math.round(rtBenefit)} ms faster</strong> with sound.`
      : rtBenefit < 0
        ? ` Correct responses were <strong>${Math.abs(Math.round(rtBenefit))} ms slower</strong> with sound.`
        : " Mean correct response time was identical across sound conditions."
    : "";

  document.body.classList.add("results-mode");
  document.body.innerHTML = `
    <div class="results-page">
      <div class="results-card">
        <h1>Multisensory Detection Results</h1>

        <div style="overflow-x:auto;">

        <details id="graphDetails">
          <summary><strong>Show signal detection graphs</strong></summary>

        <details>

          <div class="chart-grid">
            <div class="calculation-box">
              <h3>No sound</h3>

              <p>Corrected false-alarm rate = <code>(${noSound.falseAlarms} + 0.5) / (${noSound.noiseTrials} + 1)</code> = <strong>${formatNumber(noSound.falseAlarmRate, 3)}</strong></p>
              <p><code>d′ = z(HR) − z(FAR)</code> = <strong>${formatNumber(noSound.dPrime)}</strong></p>

              <p>Corrected false-alarm rate = <code>(${sound.falseAlarms} + 0.5) / (${sound.noiseTrials} + 1)</code> = <strong>${formatNumber(sound.falseAlarmRate, 3)}</strong></p>
              <p><code>d′ = z(HR) − z(FAR)</code> = <strong>${formatNumber(sound.dPrime)}</strong></p>
              <p><code>c = −0.5[z(HR) + z(FAR)]</code> = <strong>${formatNumber(sound.criterion)}</strong></p>

        <details>

        <details>
          <summary><strong>Show results by stimulus timing</strong></summary>
          <div style="overflow-x:auto;">
            <table>
              <thead>
                <tr>
                  <th>Condition</th><th>Trials</th><th>Hits</th><th>Misses</th><th>False alarms</th><th>Correct rejections</th><th>Hit rate</th><th>False-alarm rate</th><th>d′</th><th>c</th><th>Accuracy</th><th>Mean correct RT</th>
                </tr>
              </thead>
              <tbody>${timingRows}</tbody>
            </table>
          </div>
        </details>

        <details>
          <summary><strong>Show trial-level results</strong></summary>
          <div style="overflow-x:auto;">
            <table>
              <thead>
                <tr>
                  <th>Trial</th><th>Sound</th><th>Spot</th><th>Response</th><th>SDT outcome</th><th>Accuracy</th><th>RT</th><th>Location</th><th>Visibility</th><th>Onset frame</th>
                </tr>
              </thead>

            </table>
          </div>
        </details>

        <button id="restartTask" class="results-button">Run task again</button>
      </div>
    </div>`;

  const graphDetails = document.getElementById("graphDetails");
  const drawGraphs = () => {
    drawSDTPlot("noSoundCanvas", noSound);
    drawSDTPlot("soundCanvas", sound);
  };

  graphDetails.addEventListener("toggle", () => {
    if (graphDetails.open) requestAnimationFrame(drawGraphs);
  });

  window.addEventListener("resize", () => {
    if (graphDetails.open) drawGraphs();
  });

  document.getElementById("restartTask").addEventListener("click", () => {
    window.location.reload();
  });
}

/* --------------------------------------------------------------------------
   CONDITION GENERATION
   -------------------------------------------------------------------------- */

function createConditionTable() {
  const conditions = [];

  for (let sound = 1; sound <= 2; sound += 1) {
    for (let orient = 1; orient <= 1; orient += 1) {
      for (let visualStim = 1; visualStim <= 2; visualStim += 1) {
        for (let timing = 1; timing <= 4; timing += 1) {
          for (let location = 1; location <= 4; location += 1) {
            for (let visibility = 1; visibility <= 2; visibility += 1) {
              for (
                let repetition = 1;
                repetition <= CONFIG.numberTrialsPerCondition;
                repetition += 1
              ) {
                conditions.push({
                  sound: sound,
                  sound_label: sound === 2 ? "sound" : "no_sound",
                  orient: orient,
                  visual_stim: visualStim,
                  visual_stim_label:
                    visualStim === 2 ? "spot_present" : "spot_absent",
                  timing: timing,
                  stimulus_onset_frame:
                    CONFIG.stimulusOnsetFrames[timing - 1],
                  location: location,
                  location_label: ["left", "up", "right", "down"][location - 1],
                  visibility: visibility,
                  visibility_alpha:
                    CONFIG.visibilityLevels[visibility - 1],
                  repetition: repetition
                });
              }
            }
          }
        }
      }
    }
  }

  return conditions;
}

const testConditions = jsPsych.randomization.shuffle(createConditionTable());
testConditions.forEach(function(condition, index) {
  condition.count = index + 1;
});

const practiceConditions = [];
for (let index = 0; index < CONFIG.numberPracticeTrials; index += 1) {
  const sampledCondition =
    testConditions[Math.floor(Math.random() * testConditions.length)];
  practiceConditions.push({ ...sampledCondition, practice_count: index + 1 });
}

/* --------------------------------------------------------------------------
   VISUAL NOISE ANIMATION
   -------------------------------------------------------------------------- */

function startNoiseAnimation(canvas, condition, isPractice, animationRecord) {
  const cssWidth = window.innerWidth;
  const cssHeight = window.innerHeight;
  const devicePixelRatio = window.devicePixelRatio || 1;

  canvas.width = Math.round(cssWidth * devicePixelRatio);
  canvas.height = Math.round(cssHeight * devicePixelRatio);
  canvas.style.width = `${cssWidth}px`;
  canvas.style.height = `${cssHeight}px`;

  const context = canvas.getContext("2d", { alpha: false });
  context.setTransform(
    devicePixelRatio,
    0,
    0,
    devicePixelRatio,
    0,
    0
  );
  context.imageSmoothingEnabled = false;

  const centreX = cssWidth / 2;
  const centreY = cssHeight / 2;
  const maximumNoiseDiameter = Math.min(cssWidth, cssHeight) * 0.92;
  const configuredNoiseDiameter =
    CONFIG.noiseRadiusDeg * 2 * CONFIG.pixelsPerDegree;
  const noiseDiameter = Math.min(
    configuredNoiseDiameter,
    maximumNoiseDiameter
  );
  const effectivePixelsPerDegree =
    noiseDiameter / (CONFIG.noiseRadiusDeg * 2);
  const spotRadius = CONFIG.spotRadiusDeg * effectivePixelsPerDegree;
  const spotOffset = CONFIG.spotOffsetDeg * effectivePixelsPerDegree;
  const noiseLeft = centreX - noiseDiameter / 2;
  const noiseTop = centreY - noiseDiameter / 2;

  const offscreenCanvas = document.createElement("canvas");
  offscreenCanvas.width = CONFIG.noiseTextureSize;
  offscreenCanvas.height = CONFIG.noiseTextureSize;
  const offscreenContext = offscreenCanvas.getContext("2d", { alpha: false });
  const noiseImage = offscreenContext.createImageData(
    CONFIG.noiseTextureSize,
    CONFIG.noiseTextureSize
  );

  const frameDuration = 1000 / CONFIG.virtualRefreshRate;
  const visualOnsetMs =
    (condition.stimulus_onset_frame - 1) * frameDuration;
  const toneOnsetMs =
    condition.stimulus_onset_frame * frameDuration;
  const spotAlpha = isPractice
    ? 1
    : CONFIG.visibilityLevels[condition.visibility - 1];

  animationRecord.effective_pixels_per_degree = effectivePixelsPerDegree;
  animationRecord.nominal_visual_onset_ms = visualOnsetMs;
  animationRecord.nominal_tone_onset_ms = toneOnsetMs;
  animationRecord.visual_onset_actual_ms = null;
  animationRecord.last_virtual_frame = 0;
  animationRecord.animation_duration_actual_ms = null;

  unlockAudio();
  Object.assign(
    animationRecord,
    scheduleTone(
      toneOnsetMs,
      selectedStimulusDurationMs,
      condition.sound === 2
    )
  );

  function updateNoiseTexture() {
    const pixels = noiseImage.data;

    for (let index = 0; index < pixels.length; index += 4) {
      const gray = Math.floor(Math.random() * 256);
      pixels[index] = gray;
      pixels[index + 1] = gray;
      pixels[index + 2] = gray;
      pixels[index + 3] = 255;
    }

    offscreenContext.putImageData(noiseImage, 0, 0);
  }

  function drawFixation() {
    context.fillStyle = "black";
    context.fillRect(centreX - 10, centreY - 1, 20, 2);
    context.fillRect(centreX - 1, centreY - 10, 2, 20);
  }

  function drawSpot() {
    const positions = {
      1: [centreX - spotOffset, centreY],
      2: [centreX, centreY - spotOffset],
      3: [centreX + spotOffset, centreY],
      4: [centreX, centreY + spotOffset]
    };
    const position = positions[condition.location];

    context.save();
    context.globalAlpha = spotAlpha;
    context.fillStyle = "rgb(227, 227, 227)";
    context.beginPath();
    context.arc(position[0], position[1], spotRadius, 0, Math.PI * 2);
    context.fill();
    context.restore();
  }

  function drawFrame(virtualFrame, elapsedMs) {
    context.fillStyle = `rgb(${CONFIG.backgroundGray}, ${CONFIG.backgroundGray}, ${CONFIG.backgroundGray})`;
    context.fillRect(0, 0, cssWidth, cssHeight);

    updateNoiseTexture();
    context.drawImage(
      offscreenCanvas,
      noiseLeft,
      noiseTop,
      noiseDiameter,
      noiseDiameter
    );

    drawFixation();

    const showSpot =
      condition.visual_stim === 2 &&
      virtualFrame >= condition.stimulus_onset_frame &&
      virtualFrame <
        condition.stimulus_onset_frame + selectedStimulusFrames;

    if (showSpot) {
      drawSpot();

      if (animationRecord.visual_onset_actual_ms === null) {
        animationRecord.visual_onset_actual_ms = elapsedMs;
      }
    }
  }

  const animationStart = performance.now();
  let lastDrawnVirtualFrame = 0;
  let animationFrameRequest = null;

  function animate(timestamp) {
    const elapsedMs = timestamp - animationStart;
    const virtualFrame = Math.min(
      CONFIG.virtualRefreshRate,
      Math.floor(elapsedMs / frameDuration) + 1
    );

    if (virtualFrame !== lastDrawnVirtualFrame) {
      drawFrame(virtualFrame, elapsedMs);
      lastDrawnVirtualFrame = virtualFrame;
      animationRecord.last_virtual_frame = virtualFrame;
    }

    if (elapsedMs < CONFIG.noiseDurationMs) {
      animationFrameRequest = window.requestAnimationFrame(animate);
    } else {
      animationRecord.animation_duration_actual_ms = elapsedMs;
    }
  }

  // Draw immediately, then synchronize subsequent updates to the browser.
  drawFrame(1, 0);
  lastDrawnVirtualFrame = 1;
  animationRecord.last_virtual_frame = 1;
  animationFrameRequest = window.requestAnimationFrame(animate);

  animationRecord.cancel_animation = function() {
    if (animationFrameRequest !== null) {
      window.cancelAnimationFrame(animationFrameRequest);
    }
    if (animationRecord.animation_duration_actual_ms === null) {
      animationRecord.animation_duration_actual_ms =
        performance.now() - animationStart;
    }
  };
}

/* --------------------------------------------------------------------------
   TRIAL BUILDERS
   -------------------------------------------------------------------------- */

function makeInstructionTrial(filename, pageNumber) {
  return {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: assetScreen(
      filename,
      `Instruction page ${pageNumber}`,
      `<p><strong>Instruction image not found:</strong> ${filename}</p>
       <p>Place the original BMP file in the same folder as this HTML file.</p>
       <p>Press <kbd>Enter</kbd> to continue.</p>`
    ),
    choices: ["Enter"],
    data: {
      task: "msi_tutorial",
      phase: "instructions",
      instruction_page: pageNumber
    },
    on_finish: unlockAudio
  };
}

function makeFixationTrial(condition, phase) {
  const jitterMs = randomInteger(
    CONFIG.fixationJitterMinMs,
    CONFIG.fixationJitterMaxMs
  );
  const durationMs = CONFIG.fixationDurationBaseMs + jitterMs;

  return {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `
      <div class="fixation-screen">
        <div class="fixation-cross"></div>
      </div>`,
    choices: "NO_KEYS",
    trial_duration: durationMs,
    data: {
      task: "msi_tutorial",
      phase: phase,
      event: "fixation",
      count: phase === "test" ? condition.count : condition.practice_count,
      fixation_duration_ms: durationMs,
      fixation_jitter_ms: jitterMs
    }
  };
}

function makeNoiseTrial(condition, phase) {
  const isPractice = phase === "practice";
  const animationRecord = {};

  return {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `<canvas id="msi-noise-canvas" aria-label="Dynamic visual noise"></canvas>`,
    choices: "NO_KEYS",
    trial_duration: CONFIG.noiseDurationMs,
    data: {
      task: "msi_tutorial",
      phase: phase,
      event: "noise",
      count: isPractice ? condition.practice_count : condition.count,
      sound: condition.sound,
      sound_label: condition.sound_label,
      orient: condition.orient,
      visual_stim: condition.visual_stim,
      visual_stim_label: condition.visual_stim_label,
      timing: condition.timing,
      stimulus_onset_frame: condition.stimulus_onset_frame,
      location: condition.location,
      location_label: condition.location_label,
      visibility: condition.visibility,
      visibility_alpha: isPractice
        ? 1
        : CONFIG.visibilityLevels[condition.visibility - 1]
    },
    on_load: function() {
      const canvas = document.getElementById("msi-noise-canvas");
      startNoiseAnimation(canvas, condition, isPractice, animationRecord);
    },
    on_finish: function(data) {
      if (typeof animationRecord.cancel_animation === "function") {
        animationRecord.cancel_animation();
      }

      Object.keys(animationRecord).forEach(function(key) {
        if (key !== "cancel_animation") {
          data[key] = animationRecord[key];
        }
      });
    }
  };
}

function makeResponseTrial(condition, phase) {
  const isPractice = phase === "practice";

  return {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: assetScreen(
      ASSETS.target,
      "Response screen",
      `<p><strong>Response image not found:</strong> ${ASSETS.target}</p>
       <p>Use the <kbd>←</kbd> or <kbd>→</kbd> key according to the original response mapping.</p>`
    ),
    choices: ["ArrowLeft", "ArrowRight"],
    data: {
      task: "msi_tutorial",
      phase: phase,
      event: "response",
      count: isPractice ? condition.practice_count : condition.count,
      sound: condition.sound,
      sound_label: condition.sound_label,
      orient: condition.orient,
      visual_stim: condition.visual_stim,
      visual_stim_label: condition.visual_stim_label,
      timing: condition.timing,
      stimulus_onset_frame: condition.stimulus_onset_frame,
      nominal_visual_onset_ms:
        (condition.stimulus_onset_frame - 1) *
        (1000 / CONFIG.virtualRefreshRate),
      nominal_tone_onset_ms:
        condition.stimulus_onset_frame *
        (1000 / CONFIG.virtualRefreshRate),
      location: condition.location,
      location_label: condition.location_label,
      visibility: condition.visibility,
      visibility_alpha: isPractice
        ? 1
        : CONFIG.visibilityLevels[condition.visibility - 1]
    },
    on_finish: function(data) {
      data.response_visual = data.response;
      data.response_visual_code = jsPsych.pluginAPI.compareKeys(
        data.response,
        "ArrowLeft"
      ) ? 37 : 39;

      const spotWasPresent = condition.visual_stim === 2;
      const reportedPresent = jsPsych.pluginAPI.compareKeys(
        data.response,
        CONFIG.spotPresentKey
      );

      data.response_label = reportedPresent ? "Present" : "Absent";
      data.reported_present = reportedPresent ? 1 : 0;
      data.signal_present = spotWasPresent ? 1 : 0;
      data.correct = spotWasPresent === reportedPresent;

      if (spotWasPresent && reportedPresent) {
        data.sdt_outcome = "Hit";
      } else if (spotWasPresent && !reportedPresent) {
        data.sdt_outcome = "Miss";
      } else if (!spotWasPresent && reportedPresent) {
        data.sdt_outcome = "False alarm";
      } else {
        data.sdt_outcome = "Correct rejection";
      }
    }
  };
}

function addCompleteTrial(timeline, condition, phase) {
  timeline.push(makeFixationTrial(condition, phase));
  timeline.push(makeNoiseTrial(condition, phase));
  timeline.push(makeResponseTrial(condition, phase));
}

function makeIntroTrial(filename, phase, fallbackTitle) {
  return {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: assetScreen(
      filename,
      fallbackTitle,
      `<h2>${fallbackTitle}</h2>
       <p>The original image file <strong>${filename}</strong> was not found.</p>
       <p>Press <kbd>Enter</kbd> to continue.</p>`
    ),
    choices: ["Enter"],
    data: {
      task: "msi_tutorial",
      phase: phase,
      event: "intro"
    },
    on_finish: unlockAudio
  };
}

function makeBreakTrial(completedTrials) {
  return {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: assetScreen(
      ASSETS.break,
      "Break screen",
      `<h2>Break</h2>
       <p>You have completed ${completedTrials} of ${testConditions.length} test trials.</p>
       <p>Press the <kbd>Spacebar</kbd> when you are ready to continue.</p>`
    ),
    choices: [" "],
    data: {
      task: "msi_tutorial",
      phase: "test",
      event: "break",
      completed_trials: completedTrials
    },
    on_finish: unlockAudio
  };
}

/* --------------------------------------------------------------------------
   TIMELINE
   -------------------------------------------------------------------------- */

const timeline = [];

timeline.push({
  type: jsPsychFullscreen,
  fullscreen_mode: true,
  message: `
    <div class="plain-message">
      <h2>NEUR2020 Multisensory Integration Tutorial</h2>
      <p>The task will run in full screen.</p>
      <p>Use a laptop or desktop computer with a physical keyboard and sound enabled.</p>
    </div>`,
  button_label: "Enter full screen",
  data: {
    task: "msi_tutorial",
    phase: "setup",
    event: "fullscreen_enter"
  },
  on_finish: unlockAudio
});

timeline.push(makeInstructionTrial(ASSETS.instruction1, 1));
timeline.push(makeInstructionTrial(ASSETS.instruction2, 2));
timeline.push(makeInstructionTrial(ASSETS.instruction3, 3));
timeline.push(makeInstructionTrial(ASSETS.instruction4, 4));

timeline.push(
  makeIntroTrial(
    ASSETS.practiceIntro,
    "practice",
    "Practice trials"
  )
);

practiceConditions.forEach(function(condition) {
  addCompleteTrial(timeline, condition, "practice");
});

timeline.push(
  makeIntroTrial(
    ASSETS.actualIntro,
    "test",
    "Main task"
  )
);

testConditions.forEach(function(condition, index) {
  addCompleteTrial(timeline, condition, "test");

  const completedTrials = index + 1;
  if (
    completedTrials === testConditions.length / 4 ||
    completedTrials === testConditions.length / 2 ||
    completedTrials === (3 * testConditions.length) / 4
  ) {
    timeline.push(makeBreakTrial(completedTrials));
  }
});

timeline.push({
  type: jsPsychFullscreen,
  fullscreen_mode: false,
  data: {
    task: "msi_tutorial",
    phase: "end",
    event: "fullscreen_exit"
  }
});

jsPsych.run(timeline);
</script>
